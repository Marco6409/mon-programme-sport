<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Mon Programme</title>
</head>
<body>
    <nav>
        <a href="index.html">Accueil</a> 
        <a href="dashboard.html">Prog</a> 
        <a href="cardio.html">Cardio</a>
        <a href="haut.html">Haut</a>
        <a href="bas.html">Bas</a>
    </nav>

    <div class="container">
        <h1>Mon Programme</h1>

        <section class="card">
            <h3>📊 Récapitulatif Global</h3>
            <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                <span style="flex: 1 1 45%;">Haut: <b id="total-haut">0</b> kg</span>
                <span style="flex: 1 1 45%;">Bas: <b id="total-bas">0</b> kg</span>
                <span style="flex: 1 1 45%;">Kcal: <b id="total-kcal-global">0</b></span>
                <span style="flex: 1 1 45%;">Temps: <b id="total-cardio-time">0</b> min</span>
            </div>
            <p style="font-size: 1.2rem; font-weight: bold; color: #f1c40f; margin-top: 10px;">
                Grand Total : <span id="grand-total-global">0</span> kg
            </p>
        </section>
        
        <section class="card">
            <h2>📈 Suivi</h2>
            <p>Mon poids actuel : <input type="number" step="0.1" class="input-charge" value="91.0"> kg</p>
        </section>

        <section class="card">
            <h3>📜 Historique des séances</h3>
            <button onclick="enregistrerSeance()" style="background:#f1c40f; border:none; padding:5px 10px; cursor:pointer; border-radius:4px; margin-bottom:10px;">Enregistrer ma séance</button>
            <div id="historique-list" style="font-size: 0.9rem; color: #aaa;">
                <p>Aucune séance enregistrée.</p>
            </div>
        </section>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
