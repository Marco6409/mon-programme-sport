<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Bas du Corps - Salle 100</title>
</head>
<body>
    <nav>
        <a href="index.html">Accueil</a> 
        <a href="dashboard.html">Programme</a> 
        <a href="cardio.html">Cardio</a>
        <a href="haut.html">Haut</a>
        <a href="bas.html">Bas</a>
    </nav>

    <div class="container">
        <h1>Zone Bas du Corps</h1>
        
        <div class="card" style="border-left: 5px solid #fff;">
            <h3>Total Poids Séance : <span id="grand-total">0</span> kg</h3>
        </div>

        <div class="card">
            <h3>Presse à cuisse</h3>
            <div class="stats-row">
                <input type="number" class="sets" placeholder="Séries" value="4"> x 
                <input type="number" class="reps" placeholder="Reps" value="10"> à 
                <input type="number" class="weight" placeholder="Poids" value="0"> kg
            </div>
            <div class="result">Total : <span class="total-weight">0</span> kg</div>
        </div>

        <div class="card">
            <h3>Leg Extension</h3>
            <div class="stats-row">
                <input type="number" class="sets" value="4"> x 
                <input type="number" class="reps" value="10"> à 
                <input type="number" class="weight" value="0"> kg
            </div>
            <div class="result">Total : <span class="total-weight">0</span> kg</div>
        </div>

        <div class="card">
            <h3>Leg Curl</h3>
            <div class="stats-row">
                <input type="number" class="sets" value="4"> x 
                <input type="number" class="reps" value="10"> à 
                <input type="number" class="weight" value="0"> kg
            </div>
            <div class="result">Total : <span class="total-weight">0</span> kg</div>
        </div>

        <div class="card">
            <h3>Mollets</h3>
            <div class="stats-row">
                <input type="number" class="sets" value="4"> x 
                <input type="number" class="reps" value="10"> à 
                <input type="number" class="weight" value="0"> kg
            </div>
            <div class="result">Total : <span class="total-weight">0</span> kg</div>
        </div>

        <div class="card">
            <h3>Crunch (Abdos)</h3>
            <div class="stats-row">
                <input type="number" class="sets" value="4"> x 
                <input type="number" class="reps" value="10"> à 
                <input type="number" class="weight" value="0"> kg
            </div>
            <div class="result">Total : <span class="total-weight">0</span> kg</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
