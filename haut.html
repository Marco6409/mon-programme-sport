<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Haut du Corps - Salle 100</title>
</head>
<body>
    <nav>
        <a href="index.html">Accueil</a>
        <a href="cardio.html">Cardio</a>
        <a href="haut.html">Haut</a>
        <a href="bas.html">Bas</a>
    </nav>

    <div class="container">
        <h1>Zone Haut du Corps</h1>
        
        <div class="card">
            <div>
                <h3>Tirage Vertical</h3>
                <p>Record: <input type="number" class="input-charge" value="55"> kg</p>
            </div>
            <div>
                <p>Réel: <input type="number" class="input-charge" value="50"> kg</p>
                <p>Intensité: <input type="number" class="input-charge" value="8"> / 10</p>
            </div>
        </div>

        <div class="card">
            <div>
                <h3>Chest Press / Pec Deck</h3>
                <p>Record: <input type="number" class="input-charge" value="50"> kg</p>
            </div>
            <div>
                <p>Réel: <input type="number" class="input-charge" value="47"> kg</p>
                <p>Intensité: <input type="number" class="input-charge" value="7"> / 10</p>
            </div>
        </div>

        <div class="card">
            <div>
                <h3>Épaules Guidées</h3>
                <p>Record: <input type="number" class="input-charge" value="35"> kg</p>
            </div>
            <div>
                <p>Réel: <input type="number" class="input-charge" value="30"> kg</p>
                <p>Intensité: <input type="number" class="input-charge" value="9"> / 10</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
